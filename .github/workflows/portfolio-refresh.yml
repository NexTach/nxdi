name: Portfolio Refresh

on:
  schedule:
    - cron: "5 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh Portfolio Snapshot
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          REFRESH_URL: https://t-etf.vercel.app/api/cron/portfolio/refresh
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET GitHub Actions secret is required."
            exit 1
          fi

          curl --fail --show-error --silent \
            --header "Authorization: Bearer $CRON_SECRET" \
            "$REFRESH_URL"
